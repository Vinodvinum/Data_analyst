<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Viewer</title>
  <style>
    :root { --bg:#f4f8fb; --ink:#102235; --line:#d8e3ef; --panel:#fff; }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .hero,.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
    h1,h2{margin-top:0}
    a{color:#0b57d0;text-decoration:none}a:hover{text-decoration:underline}
    .row{display:flex;flex-wrap:wrap;gap:8px}
    .chip{padding:8px 12px;border:1px solid var(--line);border-radius:999px;background:#fff}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff}
    table{border-collapse:collapse;width:100%;min-width:700px}
    th,td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}
    th{background:#eef5ff;position:sticky;top:0}
    .msg{color:#4b5563}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>CSV Viewer</h1>
      <p class="msg">View CSV files in browser as tables instead of downloading raw file.</p>
      <div class="row">
        <a class="chip" href="index.html">Back to Hub</a>
        <a class="chip" href="csv-viewer.html?file=datasets/excel-project-sales-raw.csv">Excel sample</a>
        <a class="chip" href="csv-viewer.html?file=datasets/sql-practice-orders.csv">SQL orders</a>
        <a class="chip" href="csv-viewer.html?file=datasets/python-sales.csv">Python sales</a>
      </div>
    </section>

    <section class="panel">
      <h2 id="title">No file selected</h2>
      <div id="status" class="msg">Use <code>?file=filename.csv</code> in URL.</div>
      <div class="table-wrap"><table id="table"></table></div>
    </section>
  </div>

  <script>
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (ch === '"') {
          if (inQuotes && next === '"') { field += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          row.push(field); field = '';
        } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
          if (ch === '\r' && next === '\n') i++;
          row.push(field); rows.push(row); row = []; field = '';
        } else {
          field += ch;
        }
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    function render(rows) {
      const table = document.getElementById('table');
      table.innerHTML = '';
      if (!rows.length) return;
      const header = rows[0];
      const trh = document.createElement('tr');
      header.forEach(c => { const th = document.createElement('th'); th.textContent = c; trh.appendChild(th); });
      table.appendChild(trh);
      rows.slice(1).forEach(r => {
        const tr = document.createElement('tr');
        r.forEach(v => { const td = document.createElement('td'); td.textContent = v; tr.appendChild(td); });
        table.appendChild(tr);
      });
    }

    (async function() {
      const file = new URLSearchParams(location.search).get('file');
      const title = document.getElementById('title');
      const status = document.getElementById('status');
      if (!file) return;
      title.textContent = file;
      try {
        const res = await fetch(file);
        const txt = await res.text();
        const rows = parseCSV(txt);
        render(rows);
        status.textContent = `Loaded ${rows.length - 1} rows.`;
      } catch (e) {
        status.innerHTML = 'Could not load CSV in this browser context. Try opening this workspace via VS Code Live Server or use the main guides. Error: ' + e.message;
      }
    })();
  </script>
</body>
</html>
